<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وسيط شحن ACAS - مباشر</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }
        h1 { text-align: center; margin-bottom: 10px; font-size: 24px; color: #1e3c72; }
        .status-box {
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            color: #666;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #1e3c72; }
        button {
            width: 100%;
            padding: 14px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #2a5298; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-weight: bold;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .step { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔗 وسيط الشحن المباشر</h1>
    <p style="text-align: center; font-size: 12px; margin-bottom: 20px;">يعمل كبديل للباور شيل (عبر CORS Unblock)</p>

    <div class="status-box" id="status">
        حالة الاتصال: جاهز لإرسال الطلبات...
    </div>

    <form id="chargeForm">
        <div class="form-group">
            <label>اسم المستخدم (الحقيقي)</label>
            <input type="text" id="username" value="no1" required>
        </div>

        <div class="form-group">
            <label>كلمة المرور (الحقيقية)</label>
            <input type="password" id="password" value="55185512" required>
        </div>

        <div class="form-group">
            <label>المبلغ</label>
            <input type="number" id="balance" value="2400" required>
        </div>

        <button type="submit" id="submitBtn">🚀 بدء عملية الوسيط</button>
    </form>

    <div id="result" class="result"></div>
    <div id="steps" class="step"></div>
</div>

<script>
    const form = document.getElementById('chargeForm');
    const statusBox = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const stepsDiv = document.getElementById('steps');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // تجهيز البيانات
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const amt = document.getElementById('balance').value;

        // إعادة ضبط الواجهة
        resultDiv.style.display = 'none';
        stepsDiv.innerHTML = "";
        submitBtn.disabled = true;
        submitBtn.textContent = "⏳ جاري العمل...";

        try {
            // --- الخطوة 1: تسجيل الدخول (سحب الكوكيز) ---
            statusBox.innerText = "الخطوة 1: جاري تسجيل الدخول وسحب الكوكيز...";
            stepsDiv.innerHTML += "• محاولة الدخول إلى login.php...<br>";

            const loginDoc = new FormData();
            loginDoc.append('user_name', user);
            loginDoc.append('password', pass);

            const loginRes = await fetch('https://egybest.a-cas.xyz/login.php', {
                method: 'POST',
                body: loginDoc,
                credentials: 'include' // سحب الكوكيز وتخزينها في المتصفح
            });

            if (!loginRes.ok) throw new Error("فشل الوصول لصفحة الدخول");
            stepsDiv.innerHTML += "<span style='color:green'>• تم تسجيل الدخول بنجاح (الكوكيز جاهزة).</span><br>";

            // انتظار بسيط لمحاكاة الباور شيل
            await new Promise(r => setTimeout(r, 1000));

            // --- الخطوة 2: الشحن (استخدام الكوكيز) ---
            statusBox.innerText = "الخطوة 2: إرسال طلب الشحن باستخدام الكوكيز...";
            stepsDiv.innerHTML += "• إرسال البيانات إلى profile.php...<br>";

            const chargeDoc = new FormData();
            chargeDoc.append('user_name', user);
            chargeDoc.append('password1', pass);
            chargeDoc.append('password2', pass);
            chargeDoc.append('balance', amt);

            const chargeRes = await fetch('https://egybest.a-cas.xyz/profile.php', {
                method: 'POST',
                body: chargeDoc,
                credentials: 'include' // إرسال الكوكيز المسحوبة تلقائياً
            });

            if (chargeRes.ok) {
                statusBox.innerText = "تمت العملية بنجاح!";
                resultDiv.className = "result success";
                resultDiv.innerHTML = `✅ تم الشحن بنجاح!<br>المتصفح قام بدور الباور شيل وتم سحب الجلسة.`;
                resultDiv.style.display = "block";
            } else {
                throw new Error("فشل إرسال طلب الشحن");
            }

        } catch (err) {
            statusBox.innerText = "فشلت العملية";
            resultDiv.className = "result error";
            resultDiv.innerHTML = "❌ خطأ: " + err.message + "<br><small>تأكد من تفعيل CORS Unblock وصحة البيانات.</small>";
            resultDiv.style.display = "block";
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "🚀 بدء عملية الوسيط";
        }
    });
</script>

</body>
</html>
